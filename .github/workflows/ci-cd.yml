name: Deploy Aira

on:
  push:
    branches:
      - master

jobs:
  build-and-push-docker-image:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Login in to Github Container Registry
        run: docker login -u zyncc -p ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ghcr.io/zyncc/aira:latest .

      - name: Push Docker Image
        run: docker push ghcr.io/zyncc/aira:latest

  deploy:
    name: Deploy to EC2 Instance
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghcr.io/zyncc/ghcr.io/zyncc/aira:latest
            docker stop ghcr.io/zyncc/aira || true
            docker rm -f ghcr.io/zyncc/aira || true
            docker run -d -p 3000:3000 ghcr.io/zyncc/ghcr.io/zyncc/aira:latest
