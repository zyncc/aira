# k8s/00a-traefik-crd.yaml
# This file defines the custom resource types that Traefik uses.
# Applying this first ensures the cluster knows what an "IngressRoute" is.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ingressroutes.traefik.io
spec:
  group: traefik.io
  names:
    kind: IngressRoute
    listKind: IngressRouteList
    plural: ingressroutes
    singular: ingressroute
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              entryPoints:
                type: array
                items:
                  type: string
              routes:
                type: array
                items:
                  type: object
                  properties:
                    kind:
                      type: string
                      enum:
                      - Rule
                    match:
                      type: string
                    middlewares:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          namespace:
                            type: string
                        required:
                        - name
                    priority:
                      type: integer
                    services:
                      type: array
                      items:
                        type: object
                        properties:
                          kind:
                            type: string
                          name:
                            type: string
                          namespace:
                            type: string
                          passHostHeader:
                            type: boolean
                          port:
                            oneOf:
                            - type: string
                            - type: integer
                          scheme:
                            type: string
                          strategy:
                            type: string
                          weight:
                            type: integer
                        required:
                        - name
                        - port
                  required:
                  - kind
                  - match
              tls:
                type: object
                properties:
                  certResolver:
                    type: string
                  domains:
                    type: array
                    items:
                      type: object
                      properties:
                        main:
                          type: string
                        sans:
                          type: array
                          items:
                            type: string
                  options:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                  secretName:
                    type: string
    served: true
    storage: true
