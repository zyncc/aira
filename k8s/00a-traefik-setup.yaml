# k8s/00a-traefik-setup.yaml
# This single file contains all the necessary Custom Resource Definitions (CRDs)
# and Role-Based Access Control (RBAC) permissions for Traefik.

# --- Custom Resource Definitions (CRDs) ---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ingressroutes.traefik.io
spec:
  group: traefik.io
  names:
    kind: IngressRoute
    listKind: IngressRouteList
    plural: ingressroutes
    singular: ingressroute
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              entryPoints:
                type: array
                items: { type: string }
              routes:
                type: array
                items:
                  type: object
                  properties:
                    kind: { type: string, enum: [Rule] }
                    match: { type: string }
                    middlewares:
                      type: array
                      items:
                        type: object
                        properties: { name: { type: string }, namespace: { type: string } }
                        required: [name]
                    priority: { type: integer }
                    services:
                      type: array
                      items:
                        type: object
                        properties:
                          kind: { type: string }
                          name: { type: string }
                          namespace: { type: string }
                          passHostHeader: { type: boolean }
                          port: { anyOf: [{ type: integer }, { type: string }], x-kubernetes-int-or-string: true }
                          scheme: { type: string }
                          strategy: { type: string }
                          weight: { type: integer }
                        required: [name, port]
                  required: [kind, match]
              tls:
                type: object
                properties:
                  certResolver: { type: string }
                  domains:
                    type: array
                    items:
                      type: object
                      properties: { main: { type: string }, sans: { type: array, items: { type: string } } }
                  options:
                    type: object
                    properties: { name: { type: string }, namespace: { type: string } }
                    required: [name]
                  secretName: { type: string }
    served: true
    storage: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: middlewares.traefik.io
spec:
  group: traefik.io
  names: { kind: Middleware, listKind: MiddlewareList, plural: middlewares, singular: middleware }
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec: { type: object, x-kubernetes-preserve-unknown-fields: true }
    served: true
    storage: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tlsoptions.traefik.io
spec:
  group: traefik.io
  names: { kind: TLSOption, listKind: TLSOptionList, plural: tlsoptions, singular: tlsoption }
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec: { type: object, x-kubernetes-preserve-unknown-fields: true }
    served: true
    storage: true
---
# --- Role-Based Access Control (RBAC) ---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik-ingress-controller
rules:
  - apiGroups: [""]
    resources: [services, endpoints, secrets]
    verbs: [get, list, watch]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses, ingressclasses]
    verbs: [get, list, watch]
  - apiGroups: [traefik.io]
    resources: ["*"] # Grant access to all resources in the traefik.io group
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-ingress-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-ingress-controller
subjects:
  - kind: ServiceAccount
    name: default
    namespace: aira-prod
