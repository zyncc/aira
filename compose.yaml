version: '3.8'

services:
  database:
    image: postgres:17-alpine
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chandanaira"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=chandanaira
    ports:
      - 8080:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  nextjs:
    depends_on:
      database:
        condition: service_healthy
        restart: true
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
    ports:
      - 3000:3000


volumes:
  postgres_data: